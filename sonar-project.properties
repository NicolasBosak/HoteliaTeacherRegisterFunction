# SonarQube / SonarCloud analysis for the Hotelia backend.
# The token is never stored here: CI provides it via the SONAR_TOKEN secret.

sonar.projectKey=NicolasBosak_HoteliaTeacherRegisterFunction
sonar.projectName=Hotelia Teacher Register Function
sonar.projectVersion=1.0.0

# Organization key (SonarCloud only). Leave as is for a self-hosted server.
sonar.organization=nicolasbosak

# ── Scope ─────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js
sonar.sourceEncoding=UTF-8

# Infra and container manifests are analysed by Terraform/Trivy in their own
# pipeline stages, not by the JS analyser.
sonar.exclusions=node_modules/**,coverage/**,infra/**,k8s/**,**/*.test.js

# ── Coverage ──────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test doubles are support code: they should not count as duplication.
sonar.cpd.exclusions=tests/**

# ── New Code definition ───────────────────────────────────────────────
# Quality gate is evaluated against new code, so the existing debt does not
# block delivery while still preventing new debt from entering.
sonar.qualitygate.wait=true

name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "master", "devsecops-cicd" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

  sast-analysis:
    name: SAST CodeQL Analysis
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docker-build-and-scan:
    name: Build, Scan & Sign Container
    needs: sast-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless signing
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Set lowercase image name
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$REPO_OWNER/hotelia-teacher-function" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }},${{ env.IMAGE_NAME }}:latest

      - name: Run Trivy vulnerability scanner (DAST / Container Scan)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Sign the published Docker image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy-to-minikube:
    name: Deploy to Local/Minikube (Simulation)
    needs: docker-build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@master

      - name: Apply Kubernetes Manifests
        run: |
          # Convertimos el owner a minúsculas
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Reemplazamos la imagen con el tag actual
          sed -i "s|image: hotelia-teacher-function:latest|image: ghcr.io/$REPO_OWNER/hotelia-teacher-function:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Pods to be ready
        run: kubectl rollout status deployment/hotelia-teacher-function --timeout=90s

      - name: Get Service URL
        run: |
          sleep 5
          SERVICE_URL=$(minikube service hotelia-teacher-function-service --url | head -n 1)
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Run OWASP ZAP Baseline Scan (DAST against running container)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: '${{ env.SERVICE_URL }}'
          fail_action: false # Se ajusta a false para no fallar el pipeline en pruebas académicas si detecta vulnerabilidades menores

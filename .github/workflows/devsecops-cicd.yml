name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "devsecops-cicd", "master", "main" ]
  pull_request:
    branches: [ "devsecops-cicd", "master", "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint-and-test:
    name: Lint & Test (coverage gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Unit Tests (fails under coverage threshold)
        run: npm test

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  sast-analysis:
    name: SAST CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  sonarqube:
    name: SonarQube (quality, debt & coverage)
    runs-on: ubuntu-latest
    # Gated so the pipeline keeps working until SONAR_TOKEN is configured.
    # Set the repo variable SONAR_CONFIGURED=true to switch it on.
    if: vars.SONAR_CONFIGURED == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full history lets Sonar attribute issues to the right commit and
          # compute the "new code" period the quality gate is measured against.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run tests to produce coverage/lcov.info
        run: npm test

      # Scans and, because sonar-project.properties sets qualitygate.wait=true,
      # blocks the job when the quality gate on new code is red. No separate
      # quality-gate action is needed: it would poll the same API twice.
      - name: SonarQube Scan & Quality Gate
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarCloud: https://sonarcloud.io — self-hosted: your server URL.
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  docker-build-and-scan:
    name: Build, Scan & Sign Container
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless signing
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Set lowercase image name
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$REPO_OWNER/hotelia-teacher-function" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On pull requests the image is only built and scanned; it is pushed
      # (and signed) exclusively on pushes to protected branches.
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }},${{ env.IMAGE_NAME }}:latest

      - name: Trivy Report (informative, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Trivy Gate (fails on fixable CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  dast-zap:
    name: DAST (ZAP) on ephemeral Minikube — non-blocking
    needs: [docker-build-and-scan]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@master

      - name: Apply Kubernetes Manifests
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: hotelia-teacher-function:latest|image: ghcr.io/$REPO_OWNER/hotelia-teacher-function:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Pods to be ready
        run: kubectl rollout status deployment/hotelia-teacher-function --timeout=90s

      - name: Get Service URL
        run: |
          sleep 5
          SERVICE_URL=$(minikube service hotelia-teacher-function-service --url | head -n 1)
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      # Non-blocking by explicit decision: this scans an ephemeral env with no
      # real secrets. Findings are reported as artifacts/issues for triage.
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: '${{ env.SERVICE_URL }}'
          fail_action: false
          artifact_name: zap-baseline-report

  deploy-to-azure:
    name: Deploy to Azure Function App
    needs: [lint-and-test, sast-analysis]
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      vars.AZURE_CONFIGURED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://${{ vars.AZURE_FUNCTIONAPP_NAME || 'func-hotelia-dev-teacher-api-sc' }}.azurewebsites.net
    permissions:
      contents: read
      id-token: write # required for OIDC federated login (no stored credentials)
    env:
      FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME || 'func-hotelia-dev-teacher-api-sc' }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-hotelia-dev' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      # Mode A (preferred): OIDC federated credentials. Requires an Entra app
      # registration, which student accounts cannot create in this tenant —
      # switch vars.AZURE_AUTH_MODE to 'oidc' once an admin provisions it.
      - name: Azure Login (OIDC)
        if: vars.AZURE_AUTH_MODE == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App (OIDC)
        if: vars.AZURE_AUTH_MODE == 'oidc'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: '.'
          respect-funcignore: true

      # Mode B (default): publish profile scoped to this single Function App,
      # stored as the AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret.
      - name: Deploy to Function App (publish profile)
        if: vars.AZURE_AUTH_MODE != 'oidc'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: '.'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true

      # Without a function key the host answers 401 for an existing function
      # (404 would mean the function did not load; 5xx a broken host).
      - name: Smoke Test (functions host responds)
        run: |
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://$FUNCTIONAPP_NAME.azurewebsites.net/api/bulkCreateStudents" || true)

            if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
              echo "Smoke test OK (status $STATUS): host up and function routed."
              exit 0
            fi

            echo "Attempt $i: status $STATUS — retrying in 15s..."
            sleep 15
          done

          echo "Smoke test failed after retries."
          exit 1
